<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bağlantı Yok — Ledger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0D12;
      color: #E8EDEE;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #11161A;
      border: 1px solid #20292E;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 400px;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #20292E;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #88969A; line-height: 1.5; }
    .retry {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      border-radius: 10px;
      background: #2ED9A4;
      color: #0A0D12;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .retry:hover { background: #26c493; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 192 192" fill="none">
        <rect width="192" height="192" rx="36" fill="#0A0D12"/>
        <text x="96" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="112" font-weight="800" fill="#2ED9A4" text-anchor="middle" dominant-baseline="central">L</text>
      </svg>
    </div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Veriler yüklenemedi. Lütfen bağlantını kontrol et ve tekrar dene.</p>
    <button class="retry" onclick="location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
